<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bình An Shipping - 360 Virtual Tour</title>
    
    <!-- Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/lucide-react@latest/dist/umd/lucide-react.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.1);
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 0, 0, 0.2);
        }

        /* Prevent text selection during drag */
        .select-none {
            user-select: none;
            -webkit-user-select: none;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect, useMemo } = React;
        const { 
            MapPin, 
            X, 
            Upload, 
            Image: ImageIcon, 
            Plus, 
            Edit3, 
            Trash2, 
            Download 
        } = LucideReact;

        // --- HotspotSidebar Component ---
        const HotspotSidebar = ({
            hotspots,
            onEdit,
            onDelete,
            onSelect,
            className = ""
        }) => {
            return (
                <aside className={`bg-white border-r border-black/5 flex flex-col overflow-hidden transition-all duration-300 group/sidebar shrink-0 ${className}`}>
                    <div className="p-4 border-b border-black/5 flex items-center justify-between shrink-0">
                        <h2 className="text-[10px] font-bold text-black/60 uppercase tracking-widest hidden md:block group-hover/sidebar:block">Điểm 360°</h2>
                        <span className="px-2 py-0.5 bg-black/5 rounded-full text-[10px] font-bold mx-auto md:mx-0">{hotspots.length}</span>
                    </div>
                    <div className="flex-1 overflow-y-auto p-2 space-y-2 custom-scrollbar">
                        {hotspots.length === 0 ? (
                            <div className="py-12 flex flex-col items-center justify-center text-center opacity-30">
                                <Plus size={24} className="mb-2" />
                                <p className="text-[8px] font-medium uppercase tracking-tighter hidden md:block group-hover/sidebar:block">Trống</p>
                            </div>
                        ) : (
                            hotspots.map((h) => (
                                <div
                                    key={h.id}
                                    className={`group p-2 rounded-xl transition-all border flex flex-col items-center md:items-start group-hover/sidebar:items-start select-none ${
                                        h.isPlaced 
                                            ? 'bg-emerald-500/10 border-emerald-500/20 text-emerald-900' 
                                            : 'bg-white border-black/5 hover:border-black/20 shadow-sm'
                                    }`}
                                    onClick={() => h.isPlaced && onSelect(h)}
                                >
                                    <div className="flex items-center gap-3 w-full">
                                        <div className="w-10 h-10 rounded-lg overflow-hidden flex-shrink-0 bg-black/10 border border-black/5 relative pointer-events-none">
                                            <img 
                                                src={h.url} 
                                                className="w-full h-full object-cover" 
                                                alt="" 
                                                draggable="false"
                                            />
                                            {h.isPlaced && <div className="absolute top-1 right-1 w-2 h-2 rounded-full bg-emerald-500 border border-white" />}
                                        </div>
                                        <div className="flex-1 min-w-0 hidden md:block group-hover/sidebar:block text-left">
                                            <div className="flex items-center justify-between">
                                                <p className="text-[10px] font-bold truncate">{h.name}</p>
                                                <div className="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                                    <button 
                                                        onClick={(e) => { e.stopPropagation(); onEdit(h.id); }}
                                                        className="p-1 hover:bg-black/5 rounded text-black/40 hover:text-black"
                                                    >
                                                        <Edit3 size={10} />
                                                    </button>
                                                    <button 
                                                        onClick={(e) => { e.stopPropagation(); onDelete(h.id); }}
                                                        className="p-1 hover:bg-red-50 text-red-400 hover:text-red-600 rounded"
                                                    >
                                                        <Trash2 size={10} />
                                                    </button>
                                                </div>
                                            </div>
                                            <p className="text-[8px] opacity-40 font-mono">#{h.id.slice(0, 4)}</p>
                                        </div>
                                    </div>
                                </div>
                            ))
                        )}
                    </div>
                </aside>
            );
        };

        // --- Viewer360 Component ---
        const Viewer360 = ({ 
            url, 
            onClose, 
            hotspots, 
            currentId, 
            onNavigate, 
            onUpdateHotspot, 
            onEditHotspot,
            onDeleteHotspot,
            lastDrop, 
            isSetupMode 
        }) => {
            const containerRef = useRef(null);
            const cameraRef = useRef(null);

            useEffect(() => {
                if (lastDrop && cameraRef.current && containerRef.current) {
                    const rect = containerRef.current.getBoundingClientRect();
                    const mouse = new THREE.Vector2();
                    mouse.x = ((lastDrop.x - rect.left) / rect.width) * 2 - 1;
                    mouse.y = -((lastDrop.y - rect.top) / rect.height) * 2 + 1;

                    const raycaster = new THREE.Raycaster();
                    raycaster.setFromCamera(mouse, cameraRef.current);
                    
                    const dir = raycaster.ray.direction.clone().normalize();
                    const pos = dir.multiplyScalar(400);
                    
                    const r = pos.length();
                    const newLat = 90 - THREE.MathUtils.radToDeg(Math.acos(pos.y / r));
                    const newLon = THREE.MathUtils.radToDeg(Math.atan2(pos.z, pos.x));
                    
                    onUpdateHotspot(lastDrop.id, { 
                        phi: newLat, 
                        theta: newLon, 
                        isPlaced: true 
                    });
                }
            }, [lastDrop]);

            useEffect(() => {
                if (!containerRef.current) return;

                const width = containerRef.current.clientWidth;
                const height = containerRef.current.clientHeight;

                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
                cameraRef.current = camera;
                const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setSize(width, height);
                containerRef.current.appendChild(renderer.domElement);

                const geometry = new THREE.SphereGeometry(500, 60, 40);
                geometry.scale(-1, 1, 1);

                const textureLoader = new THREE.TextureLoader();
                const texture = textureLoader.load(url);
                const material = new THREE.MeshBasicMaterial({ map: texture });
                const mesh = new THREE.Mesh(geometry, material);
                scene.add(mesh);

                camera.position.set(0, 0, 0.1);

                const hotspotsGroup = new THREE.Group();
                scene.add(hotspotsGroup);

                const createHotspotMesh = (h) => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 256;
                    canvas.height = 256;
                    const ctx = canvas.getContext('2d');
                    if (ctx) {
                        ctx.clearRect(0, 0, 256, 256);
                        const text = h.name.slice(0, 20);
                        ctx.font = 'bold 28px Inter';
                        const textWidth = ctx.measureText(text).width;
                        const padding = 30;
                        
                        ctx.fillStyle = 'rgba(0,0,0,0.6)';
                        ctx.beginPath();
                        if (ctx.roundRect) {
                            ctx.roundRect(128 - (textWidth + padding) / 2, 10, textWidth + padding, 50, 25);
                        } else {
                            ctx.rect(128 - (textWidth + padding) / 2, 10, textWidth + padding, 50);
                        }
                        ctx.fill();
                        
                        ctx.fillStyle = 'white';
                        ctx.textAlign = 'center';
                        ctx.fillText(text, 128, 45);

                        ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
                        ctx.shadowBlur = 20;
                        ctx.shadowOffsetY = 10;

                        ctx.globalAlpha = 0.7;
                        ctx.fillStyle = '#f97316';
                        ctx.beginPath();
                        ctx.arc(128, 138, 70, 0, Math.PI * 2);
                        ctx.fill();
                        
                        ctx.shadowColor = 'transparent';
                        ctx.shadowBlur = 0;
                        ctx.shadowOffsetY = 0;

                        ctx.globalAlpha = 1.0;
                        ctx.strokeStyle = 'white';
                        ctx.lineWidth = 8;
                        ctx.stroke();

                        ctx.fillStyle = 'white';
                        ctx.beginPath();
                        ctx.arc(128, 138, 20, 0, Math.PI * 2);
                        ctx.fill();
                    }

                    const hotspotTexture = new THREE.CanvasTexture(canvas);
                    const hotspotMaterial = new THREE.SpriteMaterial({ 
                        map: hotspotTexture,
                        transparent: true,
                        depthTest: false
                    });
                    const sprite = new THREE.Sprite(hotspotMaterial);
                    sprite.scale.set(75, 75, 1);
                    sprite.userData = { id: h.id, hotspot: h };

                    const phi = THREE.MathUtils.degToRad(90 - (h.phi || 0));
                    const theta = THREE.MathUtils.degToRad(h.theta || 0);
                    sprite.position.set(
                        400 * Math.sin(phi) * Math.cos(theta),
                        400 * Math.cos(phi),
                        400 * Math.sin(phi) * Math.sin(theta)
                    );

                    return sprite;
                };

                hotspots.filter(h => h.id !== currentId && h.isPlaced && h.phi !== undefined && h.theta !== undefined).forEach(h => {
                    hotspotsGroup.add(createHotspotMesh(h));
                });

                let isUserInteracting = false;
                let onPointerDownPointerX = 0;
                let onPointerDownPointerY = 0;
                let onPointerDownLon = 0;
                let onPointerDownLat = 0;
                let lon = 0;
                let lat = 0;
                let phi_val = 0;
                let theta_val = 0;

                const raycaster = new THREE.Raycaster();
                const mouse = new THREE.Vector2();

                const onPointerDown = (event) => {
                    if (!containerRef.current) return;
                    const rect = containerRef.current.getBoundingClientRect();
                    mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
                    mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
                    raycaster.setFromCamera(mouse, camera);

                    const intersects = raycaster.intersectObjects(hotspotsGroup.children);
                    if (intersects.length > 0) {
                        const clickedSprite = intersects[0].object;
                        onNavigate(clickedSprite.userData.hotspot);
                        return;
                    }

                    isUserInteracting = true;
                    onPointerDownPointerX = event.clientX;
                    onPointerDownPointerY = event.clientY;
                    onPointerDownLon = lon;
                    onPointerDownLat = lat;
                };

                const onPointerMove = (event) => {
                    if (isUserInteracting) {
                        lon = (onPointerDownPointerX - event.clientX) * 0.1 + onPointerDownLon;
                        lat = (event.clientY - onPointerDownPointerY) * 0.1 + onPointerDownLat;
                    }
                };

                const onPointerUp = () => {
                    isUserInteracting = false;
                };

                const onWheel = (event) => {
                    const fov = camera.fov + event.deltaY * 0.05;
                    camera.fov = THREE.MathUtils.clamp(fov, 10, 75);
                    camera.updateProjectionMatrix();
                };

                const container = containerRef.current;
                container.addEventListener('pointerdown', onPointerDown);
                window.addEventListener('pointermove', onPointerMove);
                window.addEventListener('pointerup', onPointerUp);
                container.addEventListener('wheel', onWheel);

                const animate = () => {
                    requestAnimationFrame(animate);
                    lat = Math.max(-85, Math.min(85, lat));
                    phi_val = THREE.MathUtils.degToRad(90 - lat);
                    theta_val = THREE.MathUtils.degToRad(lon);
                    const x = 500 * Math.sin(phi_val) * Math.cos(theta_val);
                    const y = 500 * Math.cos(phi_val);
                    const z = 500 * Math.sin(phi_val) * Math.sin(theta_val);
                    camera.lookAt(x, y, z);
                    renderer.render(scene, camera);
                };

                animate();

                const handleResize = () => {
                    if (!containerRef.current) return;
                    const w = containerRef.current.clientWidth;
                    const h = containerRef.current.clientHeight;
                    camera.aspect = w / h;
                    camera.updateProjectionMatrix();
                    renderer.setSize(w, h);
                };

                window.addEventListener('resize', handleResize);

                return () => {
                    window.removeEventListener('resize', handleResize);
                    window.removeEventListener('pointermove', onPointerMove);
                    window.removeEventListener('pointerup', onPointerUp);
                    if (container) {
                        container.removeEventListener('pointerdown', onPointerDown);
                        container.removeEventListener('wheel', onWheel);
                    }
                    renderer.dispose();
                    geometry.dispose();
                    material.dispose();
                    if (container && renderer.domElement && renderer.domElement.parentNode === container) {
                        container.removeChild(renderer.domElement);
                    }
                };
            }, [url, hotspots, currentId, isSetupMode]);

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/90 backdrop-blur-sm viewer-360-container">
                    <div className="relative w-[95vw] h-[90vh] bg-black rounded-3xl overflow-hidden shadow-2xl border border-white/10 flex">
                        {isSetupMode && (
                            <HotspotSidebar 
                                className="w-16 md:w-20 lg:w-36 hover:w-72 z-10"
                                hotspots={hotspots}
                                onEdit={onEditHotspot}
                                onDelete={onDeleteHotspot}
                                onSelect={onNavigate}
                            />
                        )}
                        <div className="relative flex-1 h-full">
                            <div ref={containerRef} className="w-full h-full cursor-move" />
                            <button
                                onClick={onClose}
                                className="absolute top-6 right-6 p-3 bg-white/10 hover:bg-white/20 rounded-2xl text-white transition-all hover:scale-110 active:scale-95 z-20"
                            >
                                <X size={24} />
                            </button>
                            
                            <div className="absolute bottom-8 left-1/2 -translate-x-1/2 px-6 py-3 bg-black/50 backdrop-blur-xl rounded-2xl text-white text-[10px] font-bold uppercase tracking-wider flex gap-6 pointer-events-none border border-white/10 z-20">
                                <div className="flex items-center gap-2">
                                    <div className="w-2 h-2 rounded-full bg-white/40" />
                                    <span>Kéo để xoay</span>
                                </div>
                                <div className="flex items-center gap-2">
                                    <div className="w-2 h-2 rounded-full bg-emerald-500" />
                                    <span>Click điểm để di chuyển</span>
                                </div>
                                {isSetupMode && (
                                    <div className="flex items-center gap-2">
                                        <div className="w-2 h-2 rounded-full bg-amber-500" />
                                        <span>Kéo thả từ sidebar để thêm điểm</span>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- Main App Component ---
        function App() {
            const [hotspots, setHotspots] = useState([]);
            const [sitePlan, setSitePlan] = useState(null);
            const [selectedHotspot, setSelectedHotspot] = useState(null);
            const [isDragging, setIsDragging] = useState(false);
            const [editingHotspot, setEditingHotspot] = useState(null);
            const [lastDrop, setLastDrop] = useState(null);
            
            const containerRef = useRef(null);

            const isSetupMode = useMemo(() => {
                if (typeof window === 'undefined') return false;
                return new URLSearchParams(window.location.search).get('mode') === 'setup';
            }, []);

            // Auto-load config.json if it exists
            useEffect(() => {
                fetch('./config.json')
                    .then(res => res.json())
                    .then(data => {
                        if (data) {
                            setSitePlan(data.sitePlan || null);
                            setHotspots(data.hotspots || []);
                        }
                    })
                    .catch(() => console.log('No config.json found or error loading.'));
            }, []);

            const exportConfig = () => {
                const config = {
                    sitePlan: sitePlan,
                    hotspots: hotspots
                };
                const blob = new Blob([JSON.stringify(config, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'config.json';
                a.click();
            };

            const handleImportConfig = (e) => {
                const file = e.target.files?.[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = () => {
                        try {
                            const data = JSON.parse(reader.result);
                            setSitePlan(data.sitePlan || null);
                            setHotspots(data.hotspots || []);
                        } catch (err) {
                            alert('Lỗi định dạng file JSON');
                        }
                    };
                    reader.readAsText(file);
                }
            };

            const handleSitePlanUpload = (e) => {
                const file = e.target.files?.[0];
                if (file) {
                    const url = URL.createObjectURL(file);
                    setSitePlan(url);
                }
            };

            const handle360Upload = (e) => {
                const files = e.target.files;
                if (files && files.length > 0) {
                    Array.from(files).forEach((file) => {
                        const url = URL.createObjectURL(file);
                        const newHotspot = {
                            id: Math.random().toString(36).substr(2, 9),
                            name: file.name.split('.')[0] || 'Điểm mới',
                            url: url,
                            x: 50,
                            y: 50,
                            isPlaced: false,
                        };
                        setHotspots((prev) => [...prev, newHotspot]);
                    });
                }
            };

            const deleteHotspot = (id) => {
                setHotspots((prev) => prev.filter((h) => h.id !== id));
            };

            const updateHotspotName = (id, name) => {
                setHotspots((prev) => prev.map((h) => (h.id === id ? { ...h, name } : h)));
                setEditingHotspot(null);
            };

            return (
                <div className="h-screen flex flex-col bg-[#F8F9FA] font-sans text-[#1A1A1A]">
                    {/* Header */}
                    <header className="bg-white/80 backdrop-blur-md border-b border-black/5 px-6 py-4 grid grid-cols-3 items-center shrink-0">
                        {/* Left: Logo & Title */}
                        <div className="flex items-center gap-3">
                            <div className="w-24 h-24 flex items-center justify-center overflow-hidden">
                                <img 
                                    src="https://binhanshipping.vn/wp-content/uploads/2024/07/cropped-logo-binh-an.webp" 
                                    alt="Bình An Shipping Logo" 
                                    className="w-full h-full object-contain"
                                    referrerPolicy="no-referrer"
                                />
                            </div>
                            <div>
                                <h1 className="text-lg font-bold tracking-tight text-[#0056b3]">Bình An Shipping JSC</h1>
                                <p className="text-[10px] text-black/60 font-medium leading-tight">Số 23 đường số 2, kp.3, P. Linh Xuân, Tp. HCM</p>
                            </div>
                        </div>

                        {/* Center: Functional Buttons */}
                        <div className="flex items-center justify-center gap-2">
                            {isSetupMode && (
                                <>
                                    <button 
                                        onClick={exportConfig}
                                        className="flex items-center gap-2 px-4 py-2 bg-emerald-600 text-white rounded-full text-xs font-medium hover:bg-emerald-700 transition-all shadow-sm"
                                    >
                                        <Download size={14} />
                                        <span>Export</span>
                                    </button>
                                    
                                    <label className="flex items-center gap-2 px-4 py-2 bg-amber-600 text-white rounded-full text-xs font-medium cursor-pointer hover:bg-amber-700 transition-all shadow-sm">
                                        <Upload size={14} />
                                        <span>Import</span>
                                        <input type="file" accept=".json" className="hidden" onChange={handleImportConfig} />
                                    </label>

                                    <label className="flex items-center gap-2 px-4 py-2 bg-black text-white rounded-full text-xs font-medium cursor-pointer hover:bg-black/80 transition-all shadow-sm">
                                        <Plus size={14} />
                                        <span>Nạp 360°</span>
                                        <input type="file" accept="image/*" multiple className="hidden" onChange={handle360Upload} />
                                    </label>
                                    
                                    {!sitePlan && (
                                        <label className="flex items-center gap-2 px-4 py-2 bg-white border border-black/10 rounded-full text-xs font-medium cursor-pointer hover:bg-black/5 transition-all">
                                            <ImageIcon size={14} />
                                            <span>Mặt Bằng</span>
                                            <input type="file" accept="image/*" className="hidden" onChange={handleSitePlanUpload} />
                                        </label>
                                    )}
                                </>
                            )}
                            {!isSetupMode && (
                                 <a 
                                    href="?mode=setup"
                                    className="flex items-center gap-2 px-4 py-2 bg-black text-white rounded-full text-xs font-medium hover:bg-black/80 transition-all shadow-sm"
                                >
                                    <Edit3 size={14} />
                                    <span>Setup Mode</span>
                                </a>
                            )}
                        </div>

                        {/* Right: Project Info */}
                        <div className="flex flex-col items-end text-right">
                            <div className="flex items-center gap-2">
                                <span className="text-[10px] font-bold text-black/40 uppercase tracking-widest">Project:</span>
                                <span className="text-xs font-bold text-black/80">Riviera Alba</span>
                            </div>
                            <div className="flex items-center gap-2">
                                <span className="text-[10px] font-bold text-black/40 uppercase tracking-widest">Ngày khởi tạo:</span>
                                <span className="text-xs font-medium text-black/60">01/03/2026</span>
                            </div>
                            <div className="flex items-center gap-2">
                                <span className="text-[10px] font-bold text-black/40 uppercase tracking-widest">Người tạo:</span>
                                <span className="text-xs font-medium text-black/60">Lê Việt Bảo</span>
                            </div>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="flex-1 flex overflow-hidden bg-[#F0F2F5]">
                        {/* Sidebar */}
                        {isSetupMode && (
                            <HotspotSidebar 
                                className="w-16 md:w-20 lg:w-36 hover:w-72"
                                hotspots={hotspots}
                                onEdit={setEditingHotspot}
                                onDelete={deleteHotspot}
                                onSelect={setSelectedHotspot}
                            />
                        )}

                        {/* Site Plan Area */}
                        <section className="h-full w-full relative flex items-center justify-center overflow-hidden">
                            {!sitePlan ? (
                                <div className="text-center p-12 bg-white rounded-[40px] shadow-2xl border border-black/5 max-w-sm mx-auto">
                                    <div className="w-24 h-24 bg-black/5 rounded-full flex items-center justify-center mx-auto mb-8">
                                        <ImageIcon size={40} className="text-black/20" />
                                    </div>
                                    <h3 className="text-2xl font-bold mb-3 tracking-tight">Bắt đầu dự án</h3>
                                    <p className="text-black/40 mb-8 text-sm leading-relaxed">Tải lên hình ảnh mặt bằng để bắt đầu định vị các điểm 360°.</p>
                                    <label className="inline-flex items-center gap-3 px-8 py-4 bg-black text-white rounded-2xl font-bold cursor-pointer hover:scale-105 transition-all shadow-xl shadow-black/20 active:scale-95">
                                        <Upload size={20} />
                                        <span>Chọn file mặt bằng</span>
                                        <input type="file" accept="image/*" className="hidden" onChange={handleSitePlanUpload} />
                                    </label>
                                </div>
                            ) : (
                                <div 
                                    ref={containerRef}
                                    className="relative w-full h-full flex items-center justify-center overflow-hidden"
                                >
                                    <div className="relative inline-block max-w-[95%] max-h-[95%]">
                                        <img 
                                            src={sitePlan} 
                                            alt="Site Plan" 
                                            draggable="false"
                                            className="max-w-full max-h-[90vh] object-contain select-none pointer-events-none rounded-xl shadow-[0_40px_100px_-20px_rgba(0,0,0,0.3)]"
                                        />
                                        
                                        <div className="absolute inset-0">
                                            {hotspots.filter(h => h.isPlaced).map((h) => (
                                                <div
                                                    key={h.id}
                                                    className={`absolute z-10 ${isSetupMode ? 'cursor-grab active:cursor-grabbing' : 'cursor-pointer'}`}
                                                    style={{ 
                                                        left: `${h.x}%`, 
                                                        top: `${h.y}%`,
                                                        transform: 'translate(-50%, -50%)'
                                                    }}
                                                >
                                                    <div className="relative group/pin flex flex-col items-center">
                                                        <div className="absolute bottom-full left-1/2 -translate-x-1/2 mb-1 px-2 py-0.5 bg-black/60 backdrop-blur-sm text-white text-[8px] font-bold uppercase tracking-wider rounded-md whitespace-nowrap shadow-sm border border-white/10 pointer-events-none">
                                                            {h.name}
                                                        </div>
                                                        
                                                        <div 
                                                            onClick={() => setSelectedHotspot(h)}
                                                            className={`w-5 h-5 rounded-full flex items-center justify-center transition-all ${
                                                                selectedHotspot?.id === h.id 
                                                                    ? 'bg-red-600/60 scale-110 shadow-[0_0_10px_rgba(220,38,38,0.6)]' 
                                                                    : 'bg-red-600/30 hover:bg-red-600/50 hover:scale-110 shadow-lg'
                                                            } border-2 border-white`}
                                                        >
                                                            <div className="w-1.5 h-1.5 rounded-full bg-white" />
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    
                                    {isSetupMode && (
                                        <div className="absolute bottom-8 right-8 flex gap-3">
                                            <button 
                                                onClick={() => setSitePlan(null)}
                                                className="p-4 bg-white/80 backdrop-blur-md border border-black/5 rounded-2xl shadow-2xl hover:bg-red-50 text-red-500 transition-all hover:scale-110 active:scale-95"
                                                title="Xóa mặt bằng"
                                            >
                                                <Trash2 size={24} />
                                            </button>
                                        </div>
                                    )}
                                </div>
                            )}
                        </section>
                    </main>

                    {/* Modals */}
                    {selectedHotspot && (
                        <Viewer360 
                            url={selectedHotspot.url} 
                            onClose={() => setSelectedHotspot(null)} 
                            hotspots={hotspots}
                            currentId={selectedHotspot.id}
                            onNavigate={(h) => setSelectedHotspot(h)}
                            onUpdateHotspot={(id, data) => {
                                setHotspots(prev => prev.map(h => h.id === id ? { ...h, ...data } : h));
                            }}
                            onEditHotspot={setEditingHotspot}
                            onDeleteHotspot={deleteHotspot}
                            lastDrop={lastDrop}
                            isSetupMode={isSetupMode}
                        />
                    )}

                    {editingHotspot && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center bg-black/40 backdrop-blur-sm p-6">
                            <div className="bg-white w-full max-w-md rounded-3xl p-8 shadow-2xl">
                                <h3 className="text-xl font-semibold mb-6">Đổi tên điểm</h3>
                                <input 
                                    autoFocus
                                    type="text"
                                    defaultValue={hotspots.find(h => h.id === editingHotspot)?.name}
                                    onKeyDown={(e) => {
                                        if (e.key === 'Enter') updateHotspotName(editingHotspot, e.target.value);
                                        if (e.key === 'Escape') setEditingHotspot(null);
                                    }}
                                    className="w-full px-4 py-3 bg-black/5 rounded-xl border-none focus:ring-2 focus:ring-black mb-6"
                                />
                                <div className="flex gap-3">
                                    <button 
                                        onClick={() => setEditingHotspot(null)}
                                        className="flex-1 py-3 font-medium text-black/40 hover:text-black transition-colors"
                                    >
                                        Hủy
                                    </button>
                                    <button 
                                        onClick={() => {
                                            const input = document.querySelector('input[type="text"]');
                                            updateHotspotName(editingHotspot, input.value);
                                        }}
                                        className="flex-1 py-3 bg-black text-white rounded-xl font-medium hover:bg-black/80 transition-all"
                                    >
                                        Lưu thay đổi
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {!sitePlan && hotspots.length > 0 && isSetupMode && (
                        <div className="fixed bottom-12 left-1/2 -translate-x-1/2 z-30">
                            <div className="bg-black text-white px-6 py-3 rounded-full text-sm font-medium shadow-2xl animate-bounce">
                                Tải mặt bằng lên để bắt đầu kéo thả các điểm!
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
